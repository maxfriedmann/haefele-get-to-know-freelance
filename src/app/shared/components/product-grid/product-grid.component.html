<div class="flex flex-col md:flex-row justify-between mb-4 gap-4">
  <div class="w-full">
    <input
      type="search"
      placeholder="{{ 'products.searchPlaceholder' | translate }}"
      class="input input-bordered w-full"
      [ngModel]="searchTerm()"
      (ngModelChange)="searchTerm.set($event)"
    />
  </div>
  <div class="dropdown dropdown-end">
    <div tabindex="0" role="button" class="btn btn-secondary btn-soft text-nowrap w-full md:w-auto">
      {{ 'products.sort.sortBy' | translate }}: {{ currentSortLabel() | translate }}
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </div>
    <ul
      tabindex="0"
      class="menu dropdown-content bg-base-200 rounded-box z-10 mt-2 w-52 p-2 shadow"
    >
      @for (option of sortOptions; track option.value) {
        <li>
          <button
            [class.menu-active]="sortBy() === option.value"
            (click)="selectSort(option.value)"
          >
            {{ option.label | translate }}
          </button>
        </li>
      }
    </ul>
  </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
  @for (product of visibleProducts(); track product.id) {
    <haefele-product-card [product]="product"></haefele-product-card>
  } @empty {
    <div class="col-span-full text-center py-16 text-xl text-gray-500">
      {{ 'products.noProductsFound' | translate }}
    </div>
  }
</div>
