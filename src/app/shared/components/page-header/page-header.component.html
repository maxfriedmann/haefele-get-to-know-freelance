<header class="mt-2 md:mt-4 mb-6 md:mb-12">
  <div class="flex items-center gap-2 md:gap-4 mb-4">
    @if (level() === 1) {
      <div class="size-6 md:size-10 bg-primary/60"></div>
      <h1 class="text-xl md:text-6xl font-semibold">{{ title() }}</h1>
    } @else {
      <h2 class="text-lg md:text-4xl font-medium">{{ title() }}</h2>
    }
  </div>
  @if (subTitle(); as subTitle) {
    <p class="text-base md:text-lg text-base-content/70 mt-2">{{ subTitle }}</p>
  }
</header>
