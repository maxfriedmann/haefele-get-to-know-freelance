<div class="flex h-screen flex-col bg-base-100">
  <header class="navbar bg-base-200 shadow-sm flex-none z-10">
    <div class="container mx-auto flex items-center">
      <div class="flex-1">
        <a class="btn btn-ghost text-xl gap-0 text-secondary" routerLink="/"
          >H<span class="text-primary">Ä</span>FELE</a
        >
      </div>
      <nav class="flex-none">
        <ng-template #navLinks>
          <li>
            <a
              routerLink="/"
              routerLinkActive="menu-active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                  d="M 12 2.0996094 L 1 12 L 4 12 L 4 21 L 11 21 L 11 15 L 13 15 L 13 21 L 20 21 L 20 12 L 23 12 L 12 2.0996094 z M 12 4.7910156 L 18 10.191406 L 18 11 L 18 19 L 15 19 L 15 13 L 9 13 L 9 19 L 6 19 L 6 10.191406 L 12 4.7910156 z"
                />
              </svg>
              {{ 'nav.home' | translate }}</a
            >
          </li>
          <li>
            <a routerLink="/products" routerLinkActive="menu-active">
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                  d="M 5.75 3 A 1.0001 1.0001 0 0 0 4.8867188 3.4960938 L 3.1367188 6.4960938 A 1.0001 1.0001 0 0 0 3 7 L 3 19 C 3 20.093063 3.9069372 21 5 21 L 19 21 C 20.093063 21 21 20.093063 21 19 L 21 7 A 1.0001 1.0001 0 0 0 20.863281 6.4960938 L 19.113281 3.4960938 A 1.0001 1.0001 0 0 0 18.25 3 L 5.75 3 z M 6.3242188 5 L 17.675781 5 L 18.841797 7 L 5.1582031 7 L 6.3242188 5 z M 5 9 L 19 9 L 19 19 L 5 19 L 5 9 z M 9 11 L 9 13 L 15 13 L 15 11 L 9 11 z"
                />
              </svg>
              {{ 'nav.products' | translate }}</a
            >
          </li>
          <li>
            <a
              routerLink="/cart"
              routerLinkActive="menu-active"
              class="indicator"
              data-testid="nav-cart"
            >
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                  d="M 4.4140625 1.9960938 L 1.0039062 2.0136719 L 1.0136719 4.0136719 L 3.0839844 4.0039062 L 6.3789062 11.908203 L 5.1816406 13.824219 C 4.7816406 14.464219 4.7609531 15.272641 5.1269531 15.931641 C 5.4929531 16.590641 6.1874063 17 6.9414062 17 L 19 17 L 19 15 L 6.9414062 15 L 6.8769531 14.882812 L 8.0527344 13 L 15.521484 13 C 16.248484 13 16.917531 12.604703 17.269531 11.970703 L 20.873047 5.4863281 C 21.046047 5.1763281 21.041328 4.7981875 20.861328 4.4921875 C 20.681328 4.1871875 20.352047 4 19.998047 4 L 5.25 4 L 4.4140625 1.9960938 z M 6.0820312 6 L 18.298828 6 L 15.521484 11 L 8.1660156 11 L 6.0820312 6 z M 7 18 A 2 2 0 0 0 5 20 A 2 2 0 0 0 7 22 A 2 2 0 0 0 9 20 A 2 2 0 0 0 7 18 z M 17 18 A 2 2 0 0 0 15 20 A 2 2 0 0 0 17 22 A 2 2 0 0 0 19 20 A 2 2 0 0 0 17 18 z"
                />
              </svg>
              {{ 'nav.cart' | translate }}
              @if (cartCount$ | async) {
                <span class="badge badge-primary badge-xs indicator-item">{{
                  cartCount$ | async
                }}</span>
              }
            </a>
          </li>
        </ng-template>

        <!-- Desktop: inline horizontal menu -->
        <ul class="menu menu-horizontal px-1 gap-4 items-center hidden md:flex">
          <ng-container [ngTemplateOutlet]="navLinks" />
        </ul>

        <!-- Mobile: hamburger dropdown -->
        <div class="dropdown dropdown-end md:hidden">
          <div tabindex="0" role="button" class="btn btn-ghost btn-square">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </div>
          <ul
            tabindex="0"
            class="menu dropdown-content bg-base-200 rounded-box z-10 mt-3 w-52 gap-2 p-2 shadow"
            (click)="closeMobileMenu()"
          >
            <ng-container [ngTemplateOutlet]="navLinks" />
          </ul>
        </div>
      </nav>
    </div>
  </header>

  <main #scrollContainer class="flex-1 overflow-y-auto">
    <div class="container mx-auto p-4">
      <router-outlet />
    </div>
  </main>

  <footer class="footer footer-center bg-base-200 text-secondary p-1 flex-none shadow-sm h-12">
    <aside class="container mx-auto flex gap-4 items-center justify-between px-4">
      <div class="w-8"></div>
      <p>© 2026 HÄFELE TEST SHOP</p>
      <div class="w-8">
        <haefele-language-chooser></haefele-language-chooser>
      </div>
    </aside>
  </footer>
</div>
