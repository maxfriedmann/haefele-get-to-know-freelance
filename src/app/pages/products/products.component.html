<haefele-page-header
  title="{{ 'products.title' | translate }}"
  subTitle="{{ 'products.subTitle' | translate }}"
></haefele-page-header>

<haefele-store-loading
  [status]="productsLoadingStatus$ | async"
  [error]="productsLoadingError$ | async"
>
  <haefele-product-grid [products]="products$ | async"></haefele-product-grid>
</haefele-store-loading>
